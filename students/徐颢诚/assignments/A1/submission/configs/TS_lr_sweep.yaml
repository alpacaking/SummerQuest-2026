# TinyStories 学习率实验的共同基线。具体的 peak LR 由
# scripts/run_lr_sweep.py 通过 Hydra override 传入，保证除学习率外完全可比。
run_name: lr_sweep/placeholder

data:
  train_path: artifacts/token_ids/tinystories_train_uint16.npy
  valid_path: artifacts/token_ids/tinystories_valid_uint16.npy
  vocab_size: 10000

model:
  context_length: 256
  d_model: 512
  d_ff: 1344
  num_layers: 4
  num_heads: 16
  rope_theta: 10000.0
  dtype: float32

optimizer:
  max_lr: 0.0006
  # 始终令 min_lr = 0.1 * max_lr；改变 peak LR 时保持衰减比例相同。
  min_lr: 0.00006
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
  weight_decay: 0.1
  grad_clip_norm: 1.0

scheduler:
  warmup_steps: 250
  cosine_cycle_steps: 5000
  restart_on_resume: false

training:
  # 每卡 64；四卡时 global batch 256，与最终候选训练保持一致。
  # 实际 sweep 的 steps 会由 scripts/run_lr_sweep.py 覆盖为 1,000。
  batch_size: 64
  steps: 1000
  eval_interval: 100
  eval_batches: 20
  log_interval: 50
  checkpoint_interval: 50
  checkpoint_name: latest.pt
  resume: null
  device: cuda
  seed: 42

logging:
  backends:
    - name: jsonl
    - name: tensorboard

hydra:
  run:
    dir: logs/${run_name}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job:
    chdir: false
